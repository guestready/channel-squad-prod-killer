services:
  app:
    build: .
    ports:
      - "8742:8000"
    volumes:
      - ./data:/app/data
    environment:
      APP_PASSWORD: ${APP_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      SEED_DATA: ${SEED_DATA:-false}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/prod_killer.db}
    restart: unless-stopped

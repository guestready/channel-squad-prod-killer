<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}prod-killer{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="nav">
    <div class="nav-brand">
      <a href="/" class="nav-logo">prod-killer</a>
      <span class="nav-tagline">your team's hall of shame</span>
    </div>
    <ul class="nav-links">
      <li><a href="/" class="{{ 'active' if request.url.path == '/' else '' }}">Dashboard</a></li>
      <li><a href="/incidents" class="{{ 'active' if request.url.path.startswith('/incidents') and request.url.path != '/incidents/new' else '' }}">Incidents</a></li>
      <li><a href="/users" class="{{ 'active' if request.url.path.startswith('/users') else '' }}">Users</a></li>
      <li><a href="/leaderboard" class="{{ 'active' if request.url.path.startswith('/leaderboard') else '' }}">Leaderboard</a></li>
      <li><a href="/stats" class="{{ 'active' if request.url.path.startswith('/stats') else '' }}">Stats</a></li>
      <li><a href="/incidents/new" class="btn-nav-primary">+ Log Incident</a></li>
    </ul>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>

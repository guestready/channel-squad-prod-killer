{% extends "base.html" %}
{% block title %}Add Suspect — prod-killer{% endblock %}

{% block content %}
<div style="max-width: 520px; margin: 0 auto;">
  <div class="page-header" style="display:flex; justify-content:space-between; align-items:flex-start;">
    <div>
      <h1>Add Suspect</h1>
      <p>Induct a new member into the hall of shame.</p>
    </div>
    <a href="/users" class="link-muted">&larr; Back</a>
  </div>

  <div class="form-card">
    <form method="POST" action="/users">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" name="name" id="name" placeholder="Full name" required maxlength="100" autofocus>
      </div>
      <div class="form-group">
        <label for="team">Team</label>
        <input type="text" name="team" id="team" list="teams-list" placeholder="e.g. Backend, Platform, Data" required maxlength="100">
        <datalist id="teams-list">
          {% for team in teams %}
          <option value="{{ team }}">
          {% endfor %}
        </datalist>
      </div>
      <div class="form-group">
        <label for="nickname">Nickname <span class="label-optional">(optional)</span></label>
        <input type="text" name="nickname" id="nickname" placeholder="e.g. The Destroyer" maxlength="100">
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-danger">Add Suspect</button>
        <a href="/users" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}

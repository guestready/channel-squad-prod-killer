{% extends "base.html" %}
{% block title %}Edit {{ user.name }} — prod-killer{% endblock %}

{% block content %}
<div class="page-header" style="display:flex; justify-content:space-between; align-items:flex-start;">
  <div>
    <h1>Editing the Suspect</h1>
    <p>Changing {{ user.name }}'s profile. They'll never know.</p>
  </div>
  <a href="/users" class="link-muted">&larr; Back</a>
</div>

<div class="form-card" style="max-width: 480px;">
  <form method="POST" action="/users/{{ user.id }}/edit">
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" name="name" id="name" required maxlength="100" value="{{ user.name }}">
    </div>
    <div class="form-group">
      <label for="team">Team</label>
      <input type="text" name="team" id="team" list="teams-list" required maxlength="100" value="{{ user.team }}">
      <datalist id="teams-list">
        {% for team in teams %}
        <option value="{{ team }}">
        {% endfor %}
      </datalist>
    </div>
    <div class="form-group">
      <label for="nickname">Nickname <span class="label-optional">(optional)</span></label>
      <input type="text" name="nickname" id="nickname" maxlength="100" value="{{ user.nickname or '' }}">
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-danger">Save Changes</button>
      <a href="/users" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
